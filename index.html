<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FilmyFly Pro</title>>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* --- 1. THEME & VARIABLES --- */
        :root {
            --bg-dark: #050505;
            --bg-card: #121212;
            --primary: #FFD700; /* Gold */
            --primary-dim: rgba(255, 215, 0, 0.15);
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --nav-height: 70px;
            --radius: 16px;
            --border: 1px solid rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            padding-bottom: 90px;
            overflow-x: hidden;
        }

        /* --- 2. HEADER & SEARCH --- */
        .app-header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(5, 5, 5, 0.9); backdrop-filter: blur(15px);
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: var(--border);
        }
        .logo { font-size: 22px; font-weight: 800; color: var(--primary); letter-spacing: 1px; }

        .search-trigger {
            width: 40px; height: 40px; background: var(--bg-card); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; border: var(--border);
        }

        /* Search Overlay */
        #search-overlay {
            position: fixed; top: 0; left: 0; width: 100%; background: var(--bg-dark);
            z-index: 101; padding: 15px; display: none; border-bottom: 1px solid var(--primary);
        }
        .search-input {
            width: 100%; padding: 12px 20px; border-radius: 30px; border: none;
            background: #222; color: white; font-size: 16px; outline: none;
        }

        /* --- 3. SECTIONS --- */
        .tab-content { display: none; padding: 20px; animation: fadeIn 0.4s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .section-title { font-size: 20px; font-weight: 700; margin-bottom: 15px; border-left: 4px solid var(--primary); padding-left: 12px; }

        /* --- 4. CARDS & GRID --- */
        /* Hero Slider */
        .hero-slider { display: flex; overflow-x: auto; gap: 15px; margin: 0 -20px 30px -20px; padding: 0 20px; scrollbar-width: none; }
        .hero-slider::-webkit-scrollbar { display: none; }

        .hero-card {
            min-width: 300px; height: 180px; border-radius: var(--radius);
            background-size: cover; background-position: center; position: relative; overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .hero-overlay {
            position: absolute; bottom: 0; left: 0; width: 100%; padding: 15px;
            background: linear-gradient(to top, black, transparent);
        }

        /* Movie Grid */
        .movie-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .movie-card {
            background: var(--bg-card); border-radius: var(--radius); overflow: hidden;
            border: var(--border); position: relative; transition: 0.2s;
        }
        .movie-card:active { transform: scale(0.98); }
        .movie-poster { width: 100%; height: 230px; object-fit: cover; }
        .rating-badge {
            position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.8);
            color: var(--primary); padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: bold;
        }
        .movie-info { padding: 12px; }
        .movie-title { font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* News & Tournaments */
        .news-item {
            display: flex; gap: 15px; background: var(--bg-card); padding: 12px;
            border-radius: 12px; margin-bottom: 15px; border: var(--border);
        }
        .news-thumb { width: 80px; height: 80px; border-radius: 8px; object-fit: cover; flex-shrink: 0; }
        
        .tour-card {
            background: linear-gradient(145deg, #151515, #222); padding: 20px;
            border-radius: 16px; margin-bottom: 20px; border-left: 4px solid var(--primary);
        }
        .btn-join {
            background: white; color: black; font-weight: 700; padding: 8px 20px;
            border-radius: 20px; text-decoration: none; display: inline-block; margin-top: 10px; font-size: 14px;
        }

        /* --- 5. SKELETON LOADING --- */
        .skeleton {
            background: #1a1a1a;
            background-image: linear-gradient(90deg, #1a1a1a 0px, #2a2a2a 40px, #1a1a1a 80px);
            background-size: 600px; animation: shimmer 1.5s infinite linear; border-radius: 12px;
        }
        @keyframes shimmer { 0% { background-position: -100px; } 100% { background-position: 200px; } }
        .sk-card { height: 230px; width: 100%; }

        /* --- 6. MODAL (UPDATED FOR DOWNLOAD) --- */
        #details-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark); z-index: 2000; overflow-y: auto; display: none;
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .modal-hero { width: 100%; height: 45vh; object-fit: cover; mask-image: linear-gradient(to bottom, black 70%, transparent 100%); -webkit-mask-image: linear-gradient(to bottom, black 70%, transparent 100%); }
        .modal-body { padding: 20px; margin-top: -60px; position: relative; z-index: 2; }
        .btn-back {
            position: absolute; top: 20px; left: 20px; width: 40px; height: 40px;
            background: rgba(255,255,255,0.1); border-radius: 50%; border: none; color: white;
            font-size: 20px; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px);
        }
        
        .action-row { display: flex; gap: 15px; margin: 25px 0; }
        
        /* Updated Download Button Style */
        .btn-download {
            flex: 1; background: var(--primary); color: black; border: none; padding: 14px;
            border-radius: 12px; font-weight: 700; font-size: 16px; display: flex; align-items: center; justify-content: center; gap: 10px; text-decoration: none;
        }
        
        .btn-fav {
            width: 50px; background: #222; color: white; border: none; border-radius: 12px; font-size: 20px;
        }
        .btn-fav.active { color: #ff4444; }

        /* --- 7. NAVIGATION --- */
        .bottom-nav {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; height: 65px;
            background: rgba(20, 20, 20, 0.95); backdrop-filter: blur(10px);
            border: 1px solid #333; border-radius: 35px;
            display: flex; justify-content: space-around; align-items: center; z-index: 900;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .nav-item { color: #666; font-size: 22px; padding: 10px; transition: 0.3s; }
        .nav-item.active { color: var(--primary); transform: translateY(-3px); }

        /* Toast */
        #toast {
            position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
            background: #333; color: white; padding: 10px 20px; border-radius: 20px;
            opacity: 0; transition: 0.3s; pointer-events: none; border: 1px solid var(--primary);
        }
    </style>
</head>
<body>

    <div id="search-overlay">
        <div style="display:flex; gap:10px;">
            <input type="text" id="search-input" class="search-input" placeholder="Search movies..." oninput="handleSearch(this.value)">
            <button onclick="toggleSearch()" style="background:none; border:none; color:white; font-size:24px;">×</button>
        </div>
    </div>

    <header class="app-header">
        <div class="logo">FILMYFLY</div>
        <div class="search-trigger" onclick="toggleSearch()"><i class="fa fa-search"></i></div>
    </header>

    <main id="app-content">

        <div id="tab-home" class="tab-content active">
            <h3 class="section-title">Trending Now</h3>
            <div class="hero-slider" id="home-slider">
                <div class="hero-card skeleton" style="min-width:300px;"></div>
                <div class="hero-card skeleton" style="min-width:300px;"></div>
            </div>

            <h3 class="section-title">Latest Movies</h3>
            <div class="movie-grid" id="home-grid">
                <div class="skeleton sk-card"></div><div class="skeleton sk-card"></div>
            </div>
        </div>

        <div id="tab-movies" class="tab-content">
            <h3 class="section-title">All Movies</h3>
            <div class="movie-grid" id="all-movies-grid"></div>
            <div id="no-results" style="display:none; text-align:center; margin-top:50px; color:#666;">No movies found.</div>
        </div>

        <div id="tab-news" class="tab-content">
            <h3 class="section-title">Latest News</h3>
            <div id="news-feed"></div>
        </div>

        <div id="tab-tournaments" class="tab-content">
            <h3 class="section-title">Live Events</h3>
            <div id="tour-feed"></div>
        </div>

        <div id="tab-profile" class="tab-content">
            <div style="background:var(--bg-card); padding:30px; border-radius:20px; text-align:center; border:var(--border);">
                <div style="width:70px; height:70px; background:#222; border-radius:50%; margin:0 auto 15px; display:flex; align-items:center; justify-content:center; border:2px solid var(--primary);">
                    <i class="fa fa-user fa-2x"></i>
                </div>
                <h2>Guest User</h2>
                <p style="color:#666;">Free Member</p>
                <div style="margin-top:15px; color:white;">
                    <b id="fav-count" style="font-size:20px;">0</b><br><small style="color:#666">Saved Movies</small>
                </div>
            </div>

            <h3 class="section-title" style="margin-top:30px;">My Watchlist</h3>
            <div class="movie-grid" id="fav-grid">
                <p style="color:#666; grid-column:span 2; text-align:center;">List is empty.</p>
            </div>
            
            <h3 class="section-title" style="margin-top:30px;">Shorts</h3>
            <div id="shorts-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:10px;"></div>
        </div>

    </main>

    <div id="details-modal">
        <button class="btn-back" onclick="closeModal()"><i class="fa fa-arrow-left"></i></button>
        <img src="" id="d-poster" class="modal-hero">
        
        <div class="modal-body">
            <h1 id="d-title" style="font-size:26px; line-height:1.2; margin-bottom:10px;">Title</h1>
            <div style="color:var(--primary); font-weight:bold; font-size:18px; margin-bottom:15px;" id="d-rating">⭐ 0.0</div>
            
            <p id="d-desc" style="color:#ccc; line-height:1.6; font-size:15px;">Description...</p>

            <div class="action-row">
                <a href="#" id="d-download" target="_blank" class="btn-download">
                    <i class="fa fa-download"></i> Download Movie
                </a>
                <button class="btn-fav" id="btn-fav" onclick="toggleFav()"><i class="fa fa-heart"></i></button>
            </div>

            </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('home', this)"><i class="fa fa-home"></i></div>
        <div class="nav-item" onclick="switchTab('movies', this)"><i class="fa fa-compass"></i></div>
        <div class="nav-item" onclick="switchTab('news', this)"><i class="fa fa-bolt"></i></div>
        <div class="nav-item" onclick="switchTab('tournaments', this)"><i class="fa fa-trophy"></i></div>
        <div class="nav-item" onclick="switchTab('profile', this)"><i class="fa fa-user"></i></div>
    </nav>

    <div id="toast">Saved!</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // ---------------------------------------------------
        // ⚠️ अपनी CONFIG यहाँ पेस्ट करें ⚠️
        // ---------------------------------------------------
        const firebaseConfig = {
  apiKey: "AIzaSyDVGYXP0C33tfx-slUJPshF5X5MtvkeZpk",
  authDomain: "filmyfly4web-f864a.firebaseapp.com",
  databaseURL: "https://filmyfly4web-f864a-default-rtdb.firebaseio.com",
  projectId: "filmyfly4web-f864a",
  storageBucket: "filmyfly4web-f864a.firebasestorage.app",
  messagingSenderId: "745619172794",
  appId: "1:745619172794:web:047b14de6bdfd58ab10183"
};
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.db = db; window.ref = ref; window.onValue = onValue;
    </script>

    <script>
        // --- LOGIC ---
        let allMovies = [];
        let currentId = null;
        let favs = JSON.parse(localStorage.getItem('filmy_favs')) || [];

        setTimeout(() => { if(window.db) initApp(); }, 1000);

        function initApp() {
            loadMovies();
            loadNews();
            loadTournaments();
            loadShorts();
            renderFavs();
        }

        // 1. MOVIES
        function loadMovies() {
            window.onValue(window.ref(window.db, 'movies'), (s) => {
                const slider = document.getElementById('home-slider');
                const homeGrid = document.getElementById('home-grid');
                const allGrid = document.getElementById('all-movies-grid');
                
                slider.innerHTML = ""; homeGrid.innerHTML = ""; allGrid.innerHTML = "";
                allMovies = [];

                if(!s.exists()) { allGrid.innerHTML = "<p>No movies yet.</p>"; return; }

                let count = 0;
                s.forEach(c => {
                    let k = c.key; let v = c.val(); v.id = k;
                    allMovies.push(v);
                    
                    // Slider
                    if(count < 5) {
                        slider.innerHTML += `
                        <div class="hero-card" onclick="openDetails('${k}')" style="background-image: url('${v.poster}');">
                            <div class="hero-overlay"><h3>${v.title}</h3></div>
                        </div>`;
                    }
                    // Home Grid
                    if(count < 4) homeGrid.innerHTML += makeCard(v, k);
                    // All Grid
                    allGrid.innerHTML += makeCard(v, k);
                    count++;
                });
            });
        }

        function makeCard(v, k) {
            return `
            <div class="movie-card" onclick="openDetails('${k}')">
                <img src="${v.poster}" class="movie-poster" onerror="this.src='https://placehold.co/150?text=NA'">
                <div class="rating-badge">⭐ ${v.rating}</div>
                <div class="movie-info"><div class="movie-title">${v.title}</div></div>
            </div>`;
        }

        // 2. NEWS & OTHERS
        function loadNews() {
            window.onValue(window.ref(window.db, 'news'), (s) => {
                const f = document.getElementById('news-feed'); f.innerHTML = "";
                let arr = []; s.forEach(c => arr.push(c.val())); arr.reverse();
                arr.forEach(v => {
                    f.innerHTML += `
                    <div class="news-item">
                        <img src="${v.image}" class="news-thumb">
                        <div><b>${v.title}</b><br><small style="color:var(--primary)">${v.date}</small></div>
                    </div>`;
                });
            });
        }

        function loadTournaments() {
            window.onValue(window.ref(window.db, 'tournaments'), (s) => {
                const f = document.getElementById('tour-feed'); f.innerHTML = "";
                s.forEach(c => {
                    let v = c.val();
                    f.innerHTML += `
                    <div class="tour-card">
                        <h3>${v.name}</h3>
                        <div style="font-size:24px; color:var(--primary); font-weight:bold; margin:5px 0;">₹ ${v.prize}</div>
                        <p style="color:#999">Fee: ${v.fee}</p>
                        <a href="${v.link}" class="btn-join">Join Now</a>
                    </div>`;
                });
            });
        }

        function loadShorts() {
            window.onValue(window.ref(window.db, 'shorts'), (s) => {
                const g = document.getElementById('shorts-grid'); g.innerHTML = "";
                s.forEach(c => {
                    g.innerHTML += `
                    <div style="background:black; border-radius:12px; overflow:hidden;">
                        <iframe width="100%" height="200" src="https://www.youtube.com/embed/${c.val().video}" frameborder="0" allowfullscreen></iframe>
                        <p style="padding:10px; font-size:12px;">${c.val().title}</p>
                    </div>`;
                });
            });
        }

        // 3. SEARCH
        window.toggleSearch = function() {
            const el = document.getElementById('search-overlay');
            el.style.display = (el.style.display === 'block') ? 'none' : 'block';
            if(el.style.display === 'block') document.getElementById('search-input').focus();
        }

        window.handleSearch = function(txt) {
            const q = txt.toLowerCase();
            const g = document.getElementById('all-movies-grid');
            g.innerHTML = "";
            let found = false;
            switchTab('movies', document.querySelectorAll('.nav-item')[1]);

            allMovies.forEach(m => {
                if(m.title.toLowerCase().includes(q)) {
                    g.innerHTML += makeCard(m, m.id);
                    found = true;
                }
            });
            document.getElementById('no-results').style.display = found ? 'none' : 'block';
        }

        // 4. MODAL & FAVS (UPDATED)
        window.openDetails = function(id) {
            currentId = id;
            const m = allMovies.find(x => x.id === id);
            if(!m) return;

            document.getElementById('d-poster').src = m.poster;
            document.getElementById('d-title').innerText = m.title;
            document.getElementById('d-rating').innerText = '⭐ ' + m.rating;
            document.getElementById('d-desc').innerText = m.desc;
            
            // LINK DOWNLOAD BUTTON
            const downloadBtn = document.getElementById('d-download');
            downloadBtn.href = m.download || '#';
            
            updateFavUI();
            document.getElementById('details-modal').style.display = 'block';
        }

        window.closeModal = function() {
            document.getElementById('details-modal').style.display = 'none';
        }

        window.toggleFav = function() {
            const idx = favs.indexOf(currentId);
            if(idx === -1) { favs.push(currentId); showToast("Added to Watchlist"); }
            else { favs.splice(idx, 1); showToast("Removed"); }
            
            localStorage.setItem('filmy_favs', JSON.stringify(favs));
            updateFavUI(); renderFavs();
        }

        function updateFavUI() {
            const btn = document.getElementById('btn-fav');
            if(favs.includes(currentId)) btn.classList.add('active');
            else btn.classList.remove('active');
        }

        function renderFavs() {
            const g = document.getElementById('fav-grid');
            document.getElementById('fav-count').innerText = favs.length;
            
            if(favs.length === 0) { g.innerHTML = "<p style='color:#666; width:100%; text-align:center;'>Empty.</p>"; return; }
            if(allMovies.length === 0 && window.db) { setTimeout(renderFavs, 500); return; }

            g.innerHTML = "";
            favs.forEach(fid => {
                const m = allMovies.find(x => x.id === fid);
                if(m) g.innerHTML += makeCard(m, fid);
            });
        }

        // 5. UTILS
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.style.opacity = 1; t.style.bottom = "100px";
            setTimeout(() => { t.style.opacity = 0; t.style.bottom = "30px"; }, 2000);
        }

        window.switchTab = function(tab, el) {
            document.querySelectorAll('.tab-content').forEach(e => e.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            
            document.querySelectorAll('.nav-item').forEach(e => e.classList.remove('active'));
            if(el) el.classList.add('active');
            else document.querySelectorAll('.nav-item')[4].classList.add('active'); // Profile fallback
            window.scrollTo(0,0);
        }
    </script>
</body>
</html>
